name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Verify fixed signing certificate
        run: keytool -list -keystore keystore/bd-release.jks -storepass BdRelease2026 -alias bd

      - name: Lint, test and assemble
        run: gradle --no-daemon --stacktrace :app:lintRelease :app:testReleaseUnitTest :app:assembleRelease

      - name: Verify APK architecture
        shell: bash
        run: |
          apk="$(find app/build/outputs/apk/release -name '*.apk' -print -quit)"
          test -n "$apk"
          if unzip -l "$apk" | grep -E 'lib/(armeabi|armeabi-v7a|x86|x86_64)/'; then
            echo "Unexpected native architecture found"
            exit 1
          fi
          keytool -printcert -jarfile "$apk"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Bd-arm64-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

